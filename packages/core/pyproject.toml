[project]
name = "engram-core"
version = "0.1.0"
description = "Engram vault core: models, storage, search index, and service layer."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11,<3",
    "pydantic-settings>=2.7,<3",
    "python-ulid>=3.0,<4",
    "python-frontmatter>=1.1,<2",
    "httpx>=0.27,<1",
    "trafilatura>=1.12,<3",
    "markdownify>=0.13,<2",
    "beautifulsoup4>=4.12,<5",
    "watchdog>=4,<7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/engram_core"]
