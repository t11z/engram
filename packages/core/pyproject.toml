[project]
name = "bartleby-core"
version = "0.1.0"
description = "Bartleby vault core: models, storage, search index, and service layer."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11,<3",
    "pydantic-settings>=2.7,<3",
    "python-ulid>=3.0,<4",
    "python-frontmatter>=1.1,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bartleby_core"]
