site_name: Engram
site_description: A self-hosted personal knowledge vault that any LLM can read and write through the Model Context Protocol.
site_url: https://t11z.github.io/engram/
repo_url: https://github.com/t11z/engram
repo_name: t11z/engram
copyright: "&copy; Thomas Sprock — MIT licensed"

theme:
  name: material
  logo: assets/engram-logomark.svg
  favicon: assets/favicon.png
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

extra_css:
  - stylesheets/engram.css

extra:
  generator: false

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details

nav:
  - Home: index.md
  - Quick start: quick-start.md
  - Installation: installation.md
  - Configuration: configuration.md
  - MCP tool reference: mcp-tools.md
  - API reference: api-reference.md
  - Privacy: privacy.md
  - Changelog: changelog.md
