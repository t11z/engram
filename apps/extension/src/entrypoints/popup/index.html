<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink-1000: #070604; --ink-900: #0B0907; --ink-850: #110E0B;
      --ink-800: #181410; --ink-750: #1F1A14; --ink-700: #271F18;
      --ink-600: #322A20; --ink-500: #463B2D;
      --amber-300: #F2B65C; --amber-400: #D9983F; --amber-700: #8A5A1E;
      --chalk-100: #F4EEE3; --chalk-300: #D8CFC0; --chalk-500: #ABA08C;
      --chalk-700: #756B5C; --sage: #8AA06B; --oxide: #C5563C;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    }

    body {
      width: 380px;
      background: var(--ink-900);
      color: var(--chalk-300);
      font-family: var(--font-sans);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--ink-600);
      background: var(--ink-900);
    }
    .header-logo { display: flex; align-items: center; gap: 8px; flex: 1; }
    .header-logo svg { flex-shrink: 0; }
    .header-wordmark {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--chalk-100);
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-online { background: rgba(138,160,107,0.12); color: var(--sage); }
    .status-online .status-dot { background: var(--sage); }
    .status-offline { background: var(--ink-800); color: var(--chalk-700); }
    .status-offline .status-dot { background: var(--chalk-700); }
    .status-checking { background: rgba(217,152,63,0.1); color: var(--amber-400); }
    .status-checking .status-dot { background: var(--amber-400); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Body */
    .body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    /* Page card */
    .page-card {
      background: var(--ink-800);
      border: 1px solid var(--ink-600);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .page-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--chalk-100);
      line-height: 1.4;
      margin-bottom: 4px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .page-url {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--chalk-700);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Tags */
    .tags-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      background: var(--ink-800);
      border: 1px solid var(--ink-600);
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--chalk-500);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .tag-chip:hover { border-color: var(--ink-500); color: var(--chalk-300); }
    .tag-chip.amber { color: var(--amber-300); border-color: var(--amber-700); background: rgba(217,152,63,0.08); }
    .tag-add {
      padding: 3px 7px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--chalk-700);
      background: transparent;
      border: 1px dashed var(--ink-600);
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .tag-add:hover { border-color: var(--amber-700); color: var(--amber-400); }

    /* Textarea */
    .note-field {
      width: 100%;
      background: var(--ink-1000);
      border: 1px solid var(--ink-600);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--chalk-100);
      resize: none;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.5;
    }
    .note-field::placeholder { color: var(--chalk-700); }
    .note-field:focus { border-color: var(--amber-400); box-shadow: 0 0 0 3px rgba(217,152,63,0.15); }

    /* Footer */
    .footer { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; }
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--amber-400);
      color: var(--ink-1000);
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary:hover { background: var(--amber-300); }
    .btn-primary:active { background: var(--amber-500, #C2832E); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-link {
      width: 100%;
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--chalk-700);
      cursor: pointer;
      text-align: center;
      padding: 2px;
      transition: color 0.15s;
      letter-spacing: 0.04em;
    }
    .btn-link:hover { color: var(--amber-400); }

    /* Confirmation */
    .confirm-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px 14px;
      text-align: center;
    }
    .confirm-state.visible { display: flex; }
    .confirm-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(138,160,107,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sage);
    }
    .confirm-label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--sage);
      letter-spacing: 0.04em;
    }
    .confirm-sub { font-family: var(--font-mono); font-size: 11px; color: var(--chalk-700); }

    /* Setup prompt */
    .setup-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 24px 14px;
      text-align: center;
    }
    .setup-prompt.visible { display: flex; }
    .setup-prompt p { font-size: 13px; color: var(--chalk-500); line-height: 1.5; }
    .btn-setup {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--ink-600);
      border-radius: 7px;
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--chalk-300);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-setup:hover { border-color: var(--amber-700); color: var(--amber-400); }

    /* Error */
    .error-msg {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--oxide);
      padding: 8px 12px;
      background: rgba(197,86,60,0.08);
      border: 1px solid rgba(197,86,60,0.25);
      border-radius: 6px;
      margin: 0 14px 4px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>

  <!-- Setup prompt (shown when not configured) -->
  <div id="setup-prompt" class="setup-prompt">
    <p>Connect Engram to your vault first.</p>

  </div>

  <!-- Main content (shown when configured) -->
  <div id="main-content" style="display:none;">
    <div class="body">
      <!-- Page card -->
      <div class="page-card">
        <div class="page-title" id="page-title">Loading…</div>
        <div class="page-url" id="page-url"></div>
      </div>

      <!-- Tags -->
      <div class="tags-row" id="tags-row">
        <button class="tag-add" id="btn-add-tag" title="Add tag">+ tag</button>

        class="note-field"
        rows="3"

        Add to Engram
