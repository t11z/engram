<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bartleby — Options</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.2rem; }
      label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
      input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
      .row { margin-top: 1rem; display: flex; gap: 0.5rem; }
      button { padding: 0.5rem 1rem; cursor: pointer; }
      #status { margin-top: 1rem; min-height: 1.2rem; color: #444; }
    </style>
  </head>
  <body>
    <h1>Bartleby</h1>
    <p>Point the extension at your self-hosted Bartleby server.</p>
    <label for="serverUrl">Server URL</label>
    <input id="serverUrl" type="url" placeholder="https://bartleby.example.com" />
    <label for="token">Bearer token</label>
    <input id="token" type="password" placeholder="your BARTLEBY_AUTH_TOKEN" />
    <div class="row">
      <button id="save" type="button">Save</button>
      <button id="test" type="button">Test connection</button>
    </div>
    <div id="status" role="status"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
