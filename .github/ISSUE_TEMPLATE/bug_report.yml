name: Bug report
description: Something isn't working as documented.
title: "bug: <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please don't paste secrets (your `ENGRAM_AUTH_TOKEN`)
        or the contents of your vault.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Engram version
      placeholder: e.g. v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: deploy
    attributes:
      label: How are you running it?
      options:
        - Docker image
        - docker-compose
        - From source (bare)
        - Other (describe below)
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Server / REST API
        - MCP endpoint
        - Web UI
        - Browser extension
        - Not sure
    validations:
      required: true
  - type: input
    id: mcp-client
    attributes:
      label: MCP client (if relevant)
      placeholder: e.g. Claude Desktop, Cursor
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server logs or console output. Redact secrets and personal content.
      render: shell
  - type: checkboxes
    id: hygiene
    attributes:
      label: Confirmation
      options:
        - label: I have not included any secrets or vault contents.
          required: true
        - label: I searched existing issues for a duplicate.
          required: true
