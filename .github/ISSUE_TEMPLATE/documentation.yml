name: Documentation
description: Something in the docs is wrong, unclear, or missing.
title: "docs: <short description>"
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Which page or section?
      description: A URL on the docs site, or a file path in the repo.
      placeholder: e.g. https://t11z.github.io/engram/configuration/ or docs/IMPLEMENTATION_PLAN.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
