name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual re-run for an existing tag. By default it only regenerates the
  # auto-generated release notes from the tag's merged PRs (updates the release
  # body — it does not rebuild the Docker image or re-upload assets). Optionally
  # tick `chrome` and/or `firefox` to (re-)submit the extension to that store,
  # e.g. to retry a single store after a transient outage without re-submitting
  # the other (which the stores reject as a duplicate version).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.2.0)"
        required: true
        type: string
      chrome:
        description: "Submit to the Chrome Web Store"
        type: boolean
        default: false
      firefox:
        description: "Submit to Firefox AMO"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: docker
    # On a tag push, wait for the Docker build. On a manual dispatch the docker
    # job is skipped, so guard against that skip cascading to this job.
    if: ${{ always() && (github.event_name != 'push' || needs.docker.result == 'success') }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: github.event_name == 'push'
      - uses: actions/setup-node@v6
        if: github.event_name == 'push'
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: github.event_name == 'push'
      - name: Build store-ready artifacts (Chrome + Firefox)
        if: github.event_name == 'push'
        run: |
          # The published extension version is the release tag (v1.2.3 -> 1.2.3),
          # so the manifest always matches the GitHub Release. wxt.config.ts reads
          # ENGRAM_EXTENSION_VERSION; without it WXT falls back to package.json.
          export ENGRAM_EXTENSION_VERSION="${TAG#v}"
          pnpm --filter extension build:chrome
          pnpm --filter extension build:firefox
      - name: Package zips
        if: github.event_name == 'push'
        run: |
          mkdir -p artifacts
          (cd apps/extension/dist/chrome && zip -r "$GITHUB_WORKSPACE/artifacts/engram-extension-chrome-${TAG}.zip" .)
          (cd apps/extension/dist/firefox && zip -r "$GITHUB_WORKSPACE/artifacts/engram-extension-firefox-${TAG}.zip" .)
      # GitHub Releases are the single source of truth for release notes: the
      # "What's Changed" list is generated from the merged PRs in the tag's
      # range. We generate it ourselves and pass it as an explicit body rather
      # than using action-gh-release's generate_release_notes: when a release
      # already exists with a body (e.g. a draft pre-created in the UI with
      # "Generate release notes", or a workflow_dispatch re-run), GitHub
      # pre-pends that existing body to the freshly generated notes, duplicating
      # the list. An explicit body overwrites the existing one, so the notes
      # appear exactly once.
      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          delim="NOTES_$(date +%s)_${RANDOM}"
          notes=$(gh api -X POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" --jq .body)
          {
            echo "body<<$delim"
            echo "$notes"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          files: ${{ github.event_name == 'push' && 'artifacts/*.zip' || '' }}
          body: ${{ steps.notes.outputs.body }}

  # Store publishing. On a tag push it is opt-in via the repo variable
  # PUBLISH_EXTENSION == 'true' (so tagging never publishes by accident) and
  # submits both stores. It can also be run manually via workflow_dispatch with
  # per-store inputs to (re-)submit Chrome and/or Firefox for an existing tag —
  # e.g. to retry one store after a transient outage. Secrets are documented in
  # apps/extension/store/README.md.
  publish-extension:
    needs: release
    # On workflow_dispatch the `docker` job is skipped, and that skip propagates
    # down the needs chain (docker -> release -> here). `release` overrides it with
    # always(); this job must do the same or it inherits the skip regardless of its
    # own condition. !cancelled() forces evaluation; needs.release.result guards
    # against actually running when release failed. Store inputs are gated via
    # github.event.inputs.* (always stringified — a ticked checkbox is 'true').
    if: >-
      ${{ !cancelled() && needs.release.result == 'success'
          && ( (github.event_name == 'push' && vars.PUBLISH_EXTENSION == 'true')
               || (github.event_name == 'workflow_dispatch'
                   && (github.event.inputs.chrome == 'true' || github.event.inputs.firefox == 'true')) ) }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build store-ready zips (Chrome + Firefox + sources)
        run: |
          # Stamp the tag version into the Chrome zip, Firefox zip, and sources zip.
          # The `zip` script is `wxt zip && wxt zip -b firefox`, so this single
          # invocation already emits the Chrome zip plus the Firefox extension and
          # sources zips. Do not add a second `zip -b firefox`: pnpm appends the
          # flag a second time, WXT then builds the target list `firefox,firefox`
          # and writes a stray `…-firefox,firefox.zip`, which breaks path
          # resolution below.
          export ENGRAM_EXTENSION_VERSION="${TAG#v}"
          pnpm --filter extension zip
      - name: Resolve artifact paths
        working-directory: apps/extension/dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Require exactly one match per artifact and write absolute paths to
          # $GITHUB_ENV one variable per line. A glob that matched several files
          # would otherwise produce a multi-line value the runner rejects with
          # "Invalid format" — fail loudly with the candidates instead.
          require_one() {
            local var=$1; shift
            if [ "$#" -ne 1 ]; then
              echo "::error::expected exactly one ${var} artifact in $(pwd), found $#: $*"
              exit 1
            fi
            printf '%s=%s\n' "$var" "$PWD/$1" >> "$GITHUB_ENV"
          }
          chrome=( *chrome*.zip )
          sources=( *sources*.zip )
          firefox=()
          for z in *firefox*.zip; do
            case "$z" in *sources*) ;; *) firefox+=("$z") ;; esac
          done
          require_one CHROME_ZIP "${chrome[@]}"
          require_one FIREFOX_ZIP "${firefox[@]}"
          require_one SOURCES_ZIP "${sources[@]}"
      # Each store is submitted in its own step so a transient failure in one
      # (or a deliberate single-store dispatch) neither fails nor re-submits the
      # other. On a tag push both run; on workflow_dispatch each runs only when
      # its input is ticked. `wxt submit` only contacts the store(s) whose
      # --*-zip flags are passed.
      - name: Submit to Chrome Web Store
        if: ${{ github.event_name == 'push' || github.event.inputs.chrome == 'true' }}
        working-directory: apps/extension
        run: pnpm exec wxt submit --chrome-zip "$CHROME_ZIP"
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      - name: Submit to Firefox AMO
        if: ${{ github.event_name == 'push' || github.event.inputs.firefox == 'true' }}
        working-directory: apps/extension
        run: |
          pnpm exec wxt submit \
            --firefox-zip "$FIREFOX_ZIP" \
            --firefox-sources-zip "$SOURCES_ZIP"
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
