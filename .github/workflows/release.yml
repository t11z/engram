name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build store-ready artifacts (Chrome + Firefox)
        run: |
          pnpm --filter extension build:chrome
          pnpm --filter extension build:firefox
      - name: Package zips
        run: |
          mkdir -p artifacts
          (cd apps/extension/dist/chrome && zip -r "$GITHUB_WORKSPACE/artifacts/bartleby-extension-chrome-${{ github.ref_name }}.zip" .)
          (cd apps/extension/dist/firefox && zip -r "$GITHUB_WORKSPACE/artifacts/bartleby-extension-firefox-${{ github.ref_name }}.zip" .)
      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section for $version; see CHANGELOG.md." > release-notes.md
          fi
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: artifacts/*.zip
          generate_release_notes: false
